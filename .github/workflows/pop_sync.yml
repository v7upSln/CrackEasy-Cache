name: Monthly Charts Sync

on:
  schedule:
    - cron: '0 0 1 * *'   # Fires automatically at midnight on the 1st day of every month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pop-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-charts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Chart Parsing Engine
      run: python pop_sync.py

    - name: Commit and Push Chart Enhancements
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add metadata/ Cache/
        
        if ! git diff --cached --quiet; then
          git commit -m "sync: append monthly and yearly popular chart classifications"
          git push
        else
          echo "No database changes or chart updates detected. Exiting safely."
        fi